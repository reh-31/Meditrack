name: meditrack
description: A medicine reminder and tracking application that helps users manage medications, receive reminders, and maintain a history of medicine intake.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # State Management
  provider: ^6.1.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2
  permission_handler: ^11.3.1

  # UI
  google_fonts: ^6.2.1
  flutter_slidable: ^3.1.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
